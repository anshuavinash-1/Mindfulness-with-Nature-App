name: Flutter Test/linter run

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

defaults:
  run:
    working-directory: ./mindfulness_with_nature_app_flutter

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart Format
        run: dart format --output=none --set-exit-if-changed .

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Run Flutter Analyze (linter)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Unit Tests
        run: flutter test || true

      # Build Flutter Web (creates build/web)
      - name: Build Flutter Web
        run: flutter build web --release

      # Deploy only on pushes to main (not on pull requests)
      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: mindfulness-with-nature-2025
          channelId: live
          entryPoint: ./mindfulness_with_nature_app_flutter