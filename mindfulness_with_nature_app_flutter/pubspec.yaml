name: mindfulness_with_nature_app_flutter
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.5.4
  google_maps_flutter: ^2.14.0
  google_places_flutter: ^2.0.8
  image_picker: ^1.1.2
  fl_chart: ^1.1.1
  uuid: ^4.5.2
  intl: ^0.20.2
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  just_audio: ^0.9.42
  cached_network_image: ^3.4.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.2
  cloud_firestore: ^4.14.2
  firebase_storage: ^11.7.7
  profanity_filter: ^2.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.6.3
  build_runner: ^2.10.5
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/leaf_app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/